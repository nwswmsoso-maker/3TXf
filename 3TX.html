<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3TX - TikTok Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #ff0050; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #ff0050;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #d60046; }
        #result { margin-top: 20px; display: none; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; }
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            background: #00f2ea;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>أداة 3TX 🚀</h1>
    <p>صق رابط تيك توك للتحميل</p>
    <input type="text" id="tiktokUrl" placeholder="ضع الرابط هنا...">
    <button onclick="downloadVideo()">تحميل الآن</button>

    <div id="result">
        <p>تم استخراج الفيديو بنجاح!</p>
        <video id="videoPreview" controls></video>
        <a id="downloadLink" class="download-btn" href="#" download="3TX_Video.mp4">حفظ الفيديو بجهازي</a>
    </div>
</div>

<script>
    async function downloadVideo() {
        const url = document.getElementById('tiktokUrl').value;
        const resultDiv = document.getElementById('result');
        const videoPreview = document.getElementById('videoPreview');
        const downloadLink = document.getElementById('downloadLink');

        if (!url) {
            alert("الرجاء وضع رابط أولاً!");
            return;
        }

        try {
            // استخدام API لجلب بيانات الفيديو
            const response = await fetch(`https://www.tikwm.com/api/?url=${url}`);
            const data = await response.json();

            if (data.code === 0) {
                const videoUrl = data.data.play;
                
                // عرض النتيجة
                videoPreview.src = videoUrl;
                downloadLink.href = videoUrl;
                resultDiv.style.display = 'block';
            } else {
                alert("خطأ: تأكد من الرابط.");
            }
        } catch (error) {
            alert("حدث خطأ في الاتصال بالسيرفر.");
        }
    }
</script>

</body>
</html>
